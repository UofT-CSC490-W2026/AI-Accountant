name: Test & Coverage

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/badges/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: autobook
        run: uv sync --frozen --dev

      - name: Run tests with coverage
        working-directory: autobook
        run: uv run pytest --tb=short -q

      - name: Extract coverage percentage
        if: always()
        working-directory: autobook
        run: |
          PCT=$(uv run python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          print(int(rate * 100))
          ")
          echo "COVERAGE_PCT=$PCT" >> $GITHUB_ENV
          echo "### Test Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage markdown
        if: always()
        working-directory: autobook
        run: |
          uv run coverage report --format=markdown > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "_Generated by [Test & Coverage](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})_" >> coverage-summary.md

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: autobook/htmlcov/

      - name: Post coverage on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: autobook/coverage-summary.md

      - name: Update coverage badge
        if: always()
        run: |
          mkdir -p .github/badges
          cat > .github/badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COVERAGE_PCT}%",
            "color": "$([ $COVERAGE_PCT -ge 90 ] && echo 'brightgreen' || ([ $COVERAGE_PCT -ge 70 ] && echo 'yellow' || echo 'red'))"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git diff --staged --quiet || (git commit -m "ci: update coverage badge to ${COVERAGE_PCT}%" && git push)
