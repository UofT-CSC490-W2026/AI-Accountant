experiment_name: a4p2-sft-original-budget
nanochat_ref: a4-p2
gpu: H100
timeout_hours: 8
data_shards: -1
data_workers: 8

train:
  - name: sft_original_budget
    args:
      script: a4.p2.scripts.chat_sft_debug
      init_from_source: base
      init_from_tag: nano-swiglu-fp8-full
      init_from_step: 4357
      model_tag: a4p2-sft-orig-swiglu-budget-v1
      model_step: 4357
      load_optimizer: 1
      num_iterations: 1000
      disable_compile: 1
      device_batch_size: 8
      total_batch_size: 4096
      eval_every: -1
      eval_tokens: 4096
      chatcore_every: -1
      debug_dump_seconds: 120
      debug_heartbeat_seconds: 60
      render_max_tokens: 513
      run: a4p2-sft-original-budget-v1

eval: []
